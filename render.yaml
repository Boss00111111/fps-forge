# Render Blueprint — FPS Forge license API (Node, free tier friendly)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: fpsforge-license
    runtime: node
    plan: free
    rootDir: license-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # REQUIRED for real persistence on Render Free (SQLite on /tmp is wiped on deploy). Paste Neon "connection string" — one line, no spaces.
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
